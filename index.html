<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioរបស់ខ្ញុំ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap');

        body {
            font-family: 'Kantumruy Pro', sans-serif;
            background: linear-gradient(135deg, #970000 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #000000;
        }

        .container {
            background: rgba(241, 166, 166, 0.95);
            width: 90%;
            max-width: 400px;
            padding: 40px 20px;
            text-align: center;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden; /* ដើម្បីលាក់អក្សរដែលរត់ចេញក្រៅស៊ុម */
        }

        .header h1 {
            font-size: 22px;
            margin-bottom: 25px;
            color: #4b2c20;
        }

        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }

        .profile-pic {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: #270303;
            border: 4px solid #910000c5;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 15px; /* ចន្លោះរវាងរូបភាព និងឈ្មោះ */
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* រចនាប័ទ្មសម្រាប់អត្ថបទ "Va_Thin" */
        .profile-name-container {
            width: 100%;
            overflow: hidden; /* ដើម្បីឱ្យចលនារត់នៅខាងក្នុង */
            position: relative;
            height: 30px; /* កម្ពស់សម្រាប់អត្ថបទរត់ */
        }

        .profile-name {
            font-size: 18px;
            font-weight: bold;
            color: #4b2c20;
            white-space: nowrap; /* មិនឱ្យចុះបន្ទាត់ */
            position: absolute;
            width: 100%;
            animation: runRightToLeft 5s linear infinite; /* ចលនារត់ */
        }

        /* និយមន័យចលនារត់ពីស្តាំទៅឆ្វេង */
        @keyframes runRightToLeft {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            display: flex;
            align-items: center;
            text-decoration: none;
            padding: 15px 20px;
            border-radius: 15px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            color: white;
        }

        .link-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* ពណ៌តាមបណ្ដាញសង្គម */
        .facebook { background-color: #1877F2; }
        .discord  { background-color: #5865F2; }
        .tiktok   { background-color: #000000; }
        .website  { background-color: #4CAF50; }
        .telegram { background-color: #26A5E4; } /* ពណ៌សម្រាប់ Telegram */

        .link-card i {
            font-size: 24px;
            margin-right: 15px;
            width: 30px;
        }

        .link-text {
            flex-grow: 1;
            text-align: left;
        }

        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Bioរបស់ខ្ញុំ</h1>
        </div>

        <div class="profile-section">
            <div class="profile-pic">
                <img src="animekid.jpg" alt="profile">
            </div>
            
            <div class="profile-name-container">
                <div class="profile-name">Vaa_Thin</div>
            </div>
        </div>

        <div class="links-container">
            
            <a href="https://www.facebook.com/share/18Yk3ZtUDT/" target="_blank" class="link-card facebook">
                <i class="fa-brands fa-facebook"></i>
                <span class="link-text">Facebook របស់ខ្ញុំ</span>
            </a>

            <a href="https://discord.gg/6Uh9E47K" target="_blank" class="link-card discord">
                <i class="fa-brands fa-discord"></i>
                <span class="link-text">My Discord Server</span>
            </a>

            <a href="https://www.tiktok.com/@comonbabu" target="_blank" class="link-card tiktok">
                <i class="fa-brands fa-tiktok"></i>
                <span class="link-text">TikTok របស់ខ្ញុំ</span>
            </a>

            <a href="https://t.me/THORNVATHIN" target="_blank" class="link-card telegram">
                <i class="fa-brands fa-telegram"></i>
                <span class="link-text">Telegram របស់ខ្ញុំ</span>
            </a>

            <a href="https://mywebproflie.vercel.app/" target="_blank" class="link-card website">
                <i class="fa-solid fa-globe"></i>
                <span class="link-text">Vathin'Dev journey</span>
            </a>
 
        </div>

        <div class="footer">
            © 2026 រក្សាសិទ្ធិគ្រប់យ៉ាង
        </div>
    </div>

</body>
</html>
